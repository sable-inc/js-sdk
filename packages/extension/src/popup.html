<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sable</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 300px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #555;
        margin-top: 8px;
      }
      input,
      select {
        width: 100%;
        padding: 5px 6px;
        font: inherit;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }
      button {
        flex: 1;
        padding: 6px 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #inject-btn {
        background: #111;
        color: #fff;
        border: 1px solid #111;
        border-radius: 4px;
      }
      #inject-btn:hover {
        background: #333;
      }
      .hint {
        margin: 8px 0 0;
        font-size: 11px;
        color: #666;
        line-height: 1.4;
      }
      .hint code {
        background: #f4f4f4;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 10px;
      }
      hr {
        border: none;
        border-top: 1px solid #eee;
        margin: 12px 0 4px;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #555;
        min-height: 1em;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Sable</h1>

    <div class="row">
      <button type="button" id="inject-btn">Inject SDK</button>
    </div>
    <p class="hint">
      After injecting, run
      <code>window.Sable.start({ publicKey: "agt_…" })</code> from devtools,
      or use the form below.
    </p>

    <hr />

    <form id="sable-form">
      <label for="agent-select">Public agent ID</label>
      <select id="agent-select">
        <option value="__add__">+ Add new…</option>
      </select>

      <div id="agent-new-row" hidden>
        <label for="agent-new">New agent ID</label>
        <input id="agent-new" type="text" placeholder="agt_…" />
      </div>

      <label for="api-url">API URL</label>
      <input id="api-url" type="text" />

      <div class="row">
        <button type="submit" id="start-btn">Start</button>
        <button type="button" id="stop-btn">Stop</button>
      </div>
    </form>

    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
